<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order History - PSU E-Sports Club</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="lionlogo.png" alt="Logo" width="40" /> PSU E-Sports Club
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Register now</a></li>
          <li class="nav-item"><a class="nav-link" href="content.html">Content</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="orderhistory.html">Order History</a></li>
          <li class="nav-item"><a class="nav-link" href="approval.html">Approval</a></li>
          <li class="nav-item"><a class="nav-link" href="shipping.html">Shipping</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <h2 class="h4 mb-0">Order History</h2>
      </div>
      <div class="card-body">
        <div id="historyMessage"></div>
        <div id="orderHistoryList"></div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p>&copy; 2026 Student Club Portal | IST 256 Group Project</p>
  </footer>

  <script>
    const API_URL = "http://localhost:3000/api/members";

    function getBadgeClass(status) {
      if (status === "approved") return "bg-success";
      if (status === "declined") return "bg-danger";
      return "bg-warning text-dark";
    }

    function renderOrders(members) {
      const list = document.getElementById("orderHistoryList");
      const message = document.getElementById("historyMessage");

      list.innerHTML = "";
      message.innerHTML = "";

      if (!members.length) {
        message.innerHTML = `<div class="alert alert-secondary">No submissions found.</div>`;
        return;
      }

      members.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card mb-3";

        card.innerHTML = `
          <div class="card-body">
            <h5 class="card-title">${item.memberName}</h5>
            <p class="mb-1"><strong>ID:</strong> ${item.id || "-"}</p>
            <p class="mb-1"><strong>Email:</strong> ${item.email}</p>
            <p class="mb-1"><strong>Year:</strong> ${item.yearLevel}</p>
            <p class="mb-1"><strong>Organization:</strong> ${item.organization}</p>
            <p class="mb-1"><strong>Role:</strong> ${item.clubRole || "-"}</p>
            <p class="mb-1"><strong>Phone:</strong> ${item.phone || "-"}</p>
            <p class="mb-2"><strong>Date:</strong> ${item.submittedAt || "-"}</p>
            <span class="badge ${getBadgeClass(item.status || "pending")}">
              ${item.status || "pending"}
            </span>
          </div>
        `;

        list.appendChild(card);
      });
    }

    async function loadOrders() {
      const message = document.getElementById("historyMessage");

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Failed to load members");

        const data = await response.json();
        renderOrders(data);
      } catch (error) {
        console.error(error);
        message.innerHTML = `<div class="alert alert-danger">Could not load order history.</div>`;
      }
    }

    loadOrders();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
