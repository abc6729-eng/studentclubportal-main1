<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Registration - Student Club Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <style>
    .registration-panel {
      background: rgba(15, 23, 32, 0.96);
      color: #e8f2fb;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .registration-panel h1,
    .registration-panel h3,
    .registration-panel h4,
    .registration-panel label {
      color: #e8f2fb;
    }

    .registration-panel .form-control,
    .registration-panel .form-select,
    .registration-panel textarea {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      color: #e8f2fb;
    }

    .registration-panel .form-control::placeholder,
    .registration-panel textarea::placeholder {
      color: rgba(232, 242, 251, 0.65);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="lionlogo.png" alt="Logo" width="40">PSU E-Sports Club
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="registration.html">Register now</a></li>
          <li class="nav-item"><a class="nav-link" href="content.html">Content</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="orderhistory.html">Order History</a></li>
          <li class="nav-item"><a class="nav-link" href="approval.html">Approval</a></li>
          <li class="nav-item"><a class="nav-link" href="shipping.html">Shipping</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row">
      <div class="col-lg-8 registration-panel">
        <h1 class="mb-4">Member Registration</h1>
        <div id="messageBox"></div>

        <form id="memberForm" class="needs-validation">
          <div class="mb-3">
            <label for="memberName" class="form-label required">Full Name</label>
            <input type="text" class="form-control" id="memberName" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label required">Email</label>
            <input type="email" class="form-control" id="email" required>
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone">
          </div>

          <div class="mb-3">
            <label for="studentId" class="form-label">Student ID</label>
            <input type="text" class="form-control" id="studentId">
          </div>

          <div class="mb-3">
            <label for="yearLevel" class="form-label required">Year Level</label>
            <select class="form-select" id="yearLevel" required>
              <option value="">Select Year Level</option>
              <option value="Freshman">Freshman</option>
              <option value="Sophomore">Sophomore</option>
              <option value="Junior">Junior</option>
              <option value="Senior">Senior</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="major" class="form-label">Major</label>
            <input type="text" class="form-control" id="major">
          </div>

          <div class="mb-3">
            <label for="organization" class="form-label required">Organization</label>
            <input type="text" class="form-control" id="organization" required>
          </div>

          <div class="mb-3">
            <label for="clubRole" class="form-label">Club Role</label>
            <select class="form-select" id="clubRole">
              <option value="Member">Member</option>
              <option value="Officer">Officer</option>
              <option value="President">President</option>
              <option value="Vice President">Vice President</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="interests" class="form-label">Interests</label>
            <textarea class="form-control" id="interests" rows="2"></textarea>
          </div>

          <div class="mb-3">
            <label for="availability" class="form-label">Availability</label>
            <textarea class="form-control" id="availability" rows="2"></textarea>
          </div>

          <div class="d-grid gap-2 d-sm-flex justify-content-sm-start">
            <button type="button" class="btn btn-primary" onclick="handleFormSubmit()">Submit</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
          </div>
        </form>
      </div>
      
      <div class="col-lg-4 registration-panel mt-4 mt-lg-0">
        <h3>Registered Members</h3>
        <div class="table-responsive mt-3">
          <table class="table table-striped table-dark align-middle">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Year</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="memberTableBody">
              <tr>
                <td colspan="5" class="text-center py-4">No members registered yet.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <h4 class="mt-4">Member Data (JSON)</h4>
        <pre class="bg-light p-3 rounded"><code id="jsonOutput">[]</code></pre>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="registration.js"></script>
  <script>
    function handleFormSubmit() {
      if (!validateForm()) {
        showMessage("Please fix the errors above.", "danger");
        return;
      }

      const data = getFormData();
      let members = getMembers();

      if (editIndex >= 0) {
        members[editIndex] = data;
        showMessage("Member updated successfully.", "success");
        editIndex = -1;
      } else {
        members.push(data);
        showMessage("Member registered successfully.", "success");
      }

      saveMembers(members);
      resetForm();
      renderMembers();
    }

    // Initialize on page load
    document.addEventListener("DOMContentLoaded", function() {
      renderMembers();
      updateJsonPreview();
    });
  </script>
</body>
</html>
