<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approval Page - PSU E-Sports Club</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="lionlogo.png" alt="Logo" width="40" /> PSU E-Sports Club
      </a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="registration.html">Register now</a></li>
          <li class="nav-item"><a class="nav-link" href="content.html">Content</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="orderhistory.html">Order History</a></li>
          <li class="nav-item"><a class="nav-link active" href="approval.html">Approval</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h2 class="h4 mb-0">Approval Page</h2>
      </div>
      <div class="card-body">
        <div id="approvalMessage"></div>
        <div id="pendingList"></div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p>&copy; 2026 Student Club Portal | IST 256 Group Project</p>
  </footer>

  <script>
    const API_URL = "http://localhost:3000/api/members";

    function showMessage(text, type) {
      document.getElementById("approvalMessage").innerHTML =
        `<div class="alert alert-${type}">${text}</div>`;
    }

    function renderPending(items) {
      const pendingList = document.getElementById("pendingList");
      pendingList.innerHTML = "";

      if (!items.length) {
        pendingList.innerHTML =
          `<div class="alert alert-success">No pending submissions.</div>`;
        return;
      }

      items.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card mb-3";

        card.innerHTML = `
          <div class="card-body">
            <h5 class="card-title">${item.memberName}</h5>
            <p class="mb-1"><strong>ID:</strong> ${item.id || "-"}</p>
            <p class="mb-1"><strong>Email:</strong> ${item.email}</p>
            <p class="mb-1"><strong>Year:</strong> ${item.yearLevel}</p>
            <p class="mb-1"><strong>Organization:</strong> ${item.organization}</p>
            <p class="mb-1"><strong>Role:</strong> ${item.clubRole || "-"}</p>
            <p class="mb-3"><strong>Date:</strong> ${item.submittedAt || "-"}</p>

            <button class="btn btn-success me-2 approve-btn" data-id="${item.id}">
              Approve
            </button>
            <button class="btn btn-danger decline-btn" data-id="${item.id}">
              Decline
            </button>
          </div>
        `;

        pendingList.appendChild(card);
      });

      document.querySelectorAll(".approve-btn").forEach((btn) => {
        btn.addEventListener("click", () => updateStatus(btn.dataset.id, "approved"));
      });

      document.querySelectorAll(".decline-btn").forEach((btn) => {
        btn.addEventListener("click", () => updateStatus(btn.dataset.id, "declined"));
      });
    }

    async function loadPending() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Failed to load members");

        const data = await response.json();
        const pendingItems = data.filter((item) => (item.status || "pending") === "pending");
        renderPending(pendingItems);
      } catch (error) {
        console.error(error);
        showMessage("Could not load pending submissions.", "danger");
      }
    }

    async function updateStatus(id, status) {
      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        });

        if (!response.ok) throw new Error("Failed to update status");

        showMessage(`Submission ${status} successfully.`, "info");
        loadPending();
      } catch (error) {
        console.error(error);
        showMessage("Could not update submission status.", "danger");
      }
    }

    loadPending();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
